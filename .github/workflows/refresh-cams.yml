name: Refresh St. Augustine cams

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch live streams
        run: node update-cams.mjs
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}

      - name: Commit if changed
        run: |
          git config user.name  "cam-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cams.json
          git diff --staged --quiet || git commit -m "Refresh live cams"
          git push
